# The infrastructure layer implements the domain's ports (adapters). It depends
# on `domain` (to know the port contracts) and, over time, on external drivers
# (database, cache, ...). It never depends on `application` or `api`:
# dependencies point inward.
[dependencies]
domain.workspace = true
