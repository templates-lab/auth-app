# Static server for the built SPA (bead authapp-d13578).
#
# This container sits behind Traefik: the edge routes `/` to it (see
# infra/traefik/docker-compose.yml, the `web` service and `web-chain`
# middleware), terminates TLS, and forwards plain HTTP here on :80. So this
# config does no TLS and no routing beyond "serve the SPA".
#
# The one job that MUST live here and not at the edge is the SPA fallback:
# client-side routes like `/users` have no matching file on disk, so a bare
# static server would 404 them. `try_files ... /index.html` rewrites any
# unmatched path to the app entry point, letting @solidjs/router take over —
# which is what "SPA fallback working behind Traefik" means.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Hashed build assets (dist/assets/*) are immutable — cache them hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Never let the HTML entry point be cached, so a new deploy is picked up
    # immediately even while assets are cached for a year.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA fallback: serve the requested file if it exists, else hand the route
    # to the client app.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
