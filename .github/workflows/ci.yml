name: CI

# Lint + test + build for the auth-app monorepo. The pipeline is split into a
# Rust `backend` job and a pnpm `frontend` job, and a `changes` job gates each
# so a push that only touches one stack never compiles the other. Dependency
# caches (cargo + pnpm) keep repeat runs fast.

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref (e.g. a new push to an open PR).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Detect which stacks the diff touches so the heavy jobs below can be skipped
  # when unaffected. On pull_request the diff is against the base branch; on
  # push it is against the previous commit.
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rustfmt.toml'
              - 'clippy.toml'
              - '.github/workflows/ci.yml'
            frontend:
              - 'apps/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig*.json'
              - 'eslint.config.js'
              - '.prettierrc.json'
              - '.prettierignore'
              - '.npmrc'
              - '.github/workflows/ci.yml'

  # Secret scan: gitleaks over the full history on every push and PR, ungated by
  # `changes` — a secret can be introduced in any file, so this must always run.
  # A finding fails the job and (via the `ci` gate) blocks the merge. Fake
  # credentials in tests and .env.example are allowlisted in .gitleaks.toml.
  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so gitleaks scans every commit, not just the tip.
          fetch-depth: 0
      - name: Run gitleaks
        env:
          GITLEAKS_VERSION: 8.21.2
        run: |
          curl -sSL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks detect --source . --config .gitleaks.toml --redact --no-banner --verbose

  # Rust backend: format, lint, test, build across the whole Cargo workspace.
  backend:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: Test
        run: cargo test --workspace --locked
      - name: Build
        run: cargo build --workspace --all-targets --locked

  # pnpm frontend: lint, prettier check, test, build across the pnpm workspace.
  frontend:
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # action-setup reads the pinned pnpm version from package.json
      # (packageManager) and must run before setup-node so the pnpm store cache
      # can resolve.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm run lint
      - name: Format check
        run: pnpm run format:check
      - name: Test
        run: pnpm run test
      - name: Build
        run: pnpm run build

  # API contract: regenerate the OpenAPI spec from the backend and the
  # TypeScript client from the spec, then fail if either differs from what is
  # committed — so a backend change that isn't reflected in the checked-in spec
  # and client cannot merge. Runs when either stack (or the spec/client) moves.
  api-contract:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Regenerate spec and client
        run: pnpm run gen:api
      - name: Fail if the spec or client is out of date
        run: git diff --exit-code -- openapi.json packages/api-client/src/schema.ts

  # Single required status check for branch protection: green when every
  # affected job passed. Skipped stacks (unaffected) do not fail the gate.
  ci:
    if: always()
    needs: [changes, secrets, backend, frontend, api-contract]
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate result
        run: |
          if [ "${{ needs.changes.result }}" != "success" ]; then
            echo "changes job did not succeed"; exit 1
          fi
          # The secret scan always runs and must always pass.
          if [ "${{ needs.secrets.result }}" != "success" ]; then
            echo "secrets job did not succeed"; exit 1
          fi
          for stack in backend frontend api-contract; do
            case "$stack" in
              backend) result="${{ needs.backend.result }}" ;;
              frontend) result="${{ needs.frontend.result }}" ;;
              api-contract) result="${{ needs.api-contract.result }}" ;;
            esac
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              echo "$stack job $result"; exit 1
            fi
          done
          echo "CI passed"
